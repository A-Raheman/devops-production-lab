services:
  flask-app:
     restart: unless-stopped
     image: docker-advanced:v6
     
     networks:
          - devops-net
     environment:
        APP_MESSAGE: "Docker Compose service discovery works"
     healthcheck:
        test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/').read()\" || exit 1"]
        interval: 30s
        timeout: 3s
        retries: 3
        start_period: 10s

  nginx-test:
     restart: unless-stopped
     image: nginx:alpine
     
     networks:
        - devops-net
     ports:
        - "8081:80"
     volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf:ro
     depends_on:
        - flask-app

networks:
  devops-net:
     external: true
